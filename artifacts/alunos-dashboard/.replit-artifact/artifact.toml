kind = "web"
previewPath = "/"
title = "Dashboard Alunos SENAI"
version = "1.0.0"
id = "artifacts/alunos-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
localPort = 24972
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/alunos-dashboard run dev"

[services.env]
PORT = "24972"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/alunos-dashboard", "run", "build"]
publicDir = "artifacts/alunos-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
