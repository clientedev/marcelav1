        // UI Components
        function SectionHeader({ icon: IconName, title, accent, isDark }) {
            return (
                <div className="flex items-center gap-3 mb-4 pb-3 border-b-2 border-opacity-10" style={{ borderBottomColor: accent }}>
                    <div className="w-9 h-9 rounded-xl flex items-center justify-center bg-opacity-10" style={{ backgroundColor: accent, color: accent }}>
                        <i data-lucide={IconName} className="w-5 h-5"></i>
                    </div>
                    <span className={`text-base font-bold ${isDark ? "text-slate-100" : "text-slate-900"}`}>{title}</span>
                    <div className="flex-1 h-px bg-gradient-to-r from-transparent to-transparent" style={{ backgroundImage: `linear-gradient(90deg, ${accent}44, transparent)` }} />
                </div>
            );
        }

        function ChartCard({ title, children, isDark }) {
            return (
                <div className={`overflow-hidden rounded-2xl border transition-all duration-300 ${isDark ? "bg-slate-800/80 border-white/5" : "bg-white border-slate-200"} shadow-sm`}>
                    <div className={`px-4 py-3 border-b flex items-center justify-between ${isDark ? "border-white/5" : "border-slate-100"}`}>
                        <span className={`text-xs font-semibold ${isDark ? "text-slate-200" : "text-slate-700"}`}>{title}</span>
                    </div>
                    <div className="p-4">{children}</div>
                </div>
            );
        }

        function KPICard({ label, value, suffix = "", accent, isDark, sub }) {
            return (
                <div className={`relative overflow-hidden rounded-2xl p-5 border-t-[3px] transition-all duration-300 ${isDark ? "bg-slate-800/80 border-white/5" : "bg-white border-slate-200 shadow-sm"}`} style={{ borderTopColor: accent }}>
                    <div className="absolute -top-5 -right-5 w-20 h-20 rounded-full bg-opacity-5" style={{ backgroundColor: accent }} />
                    <p className={`text-[10px] font-bold uppercase tracking-wider mb-1.5 ${isDark ? "text-slate-400" : "text-slate-500"}`}>{label}</p>
                    <p className="text-2xl font-extrabold tracking-tight leading-none" style={{ color: accent }}>
                        {value}<span className="text-lg opacity-80">{suffix}</span>
                    </p>
                    {sub && <p className={`text-[10px] mt-1.5 ${isDark ? "text-slate-500" : "text-slate-400"}`}>{sub}</p>}
                </div>
            );
        }

        const CustomTooltip = ({ active, payload, label }) => {
            if (!active || !payload || payload.length === 0) return null;
            return (
                <div className="bg-slate-900/90 text-slate-100 p-3 rounded-xl border border-white/10 text-xs shadow-xl glass">
                    {label && <div className="font-bold text-slate-300 mb-1.5">{label}</div>}
                    {payload.map((entry, i) => (
                        <div key={i} className="flex items-center gap-2 mt-1">
                            <span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: entry.color || entry.fill }} />
                            <span className="text-slate-400 font-medium">{entry.name}:</span>
                            <span className="ml-auto font-bold">{entry.value}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const CustomLegend = ({ payload }) => {
            if (!payload?.length) return null;
            return (
                <div className="flex flex-wrap justify-center gap-x-4 gap-y-1 text-[10px] mt-4">
                    {payload.map((e, i) => (

                            <span className="text-slate-500 font-medium">{e.value}</span>
                        </div>
                    ))}
                </div>
            );

        // Main Dashboard Component

            }, [isDark]);

                // Initialize Lucide icons
                lucide.createIcons();

            const tickColor = isDark ? "#64748b" : "#94a3b8";

                <div className="min-h-screen text-slate-900 dark:text-slate-100 pb-12">

                                <div className="flex items-center gap-2.5 mb-2.5">
                                    <div className="bg-white/20 p-1.5 rounded-lg">
                                        <i data-lucide="graduation-cap" className="w-5 h-5"></i>
                                    </div>
                                    <span className="text-[10px] font-bold uppercase tracking-[0.1em] opacity-80">
                                        SENAI · Escola "Morvan Figueiredo"
                                    </span>
                                </div>
                                <h1 className="text-3xl font-extrabold tracking-tight">Pesquisa Social</h1>
                                <p className="text-sm opacity-80 mt-1 font-medium italic">
                                    Perfil socioeconômico · {d.total} alunos matriculados · {semester === 'all' ? 'Todos os Anos' : semester}
                                </p>
                            </div>

                            <div className="flex items-center gap-2.5 self-start md:self-auto">
                                <button 
                                    onClick={() => window.print()}
                                    className="p-2.5 rounded-xl bg-white/15 hover:bg-white/25 transition-colors duration-200 border border-white/10"
                                >
                                    <i data-lucide="printer" className="w-4 h-4 text-white"></i>
                                </button>
                                <button 
                                    onClick={() => setIsDark(!isDark)}
                                    className="p-2.5 rounded-xl bg-white/15 hover:bg-white/25 transition-colors duration-200 border border-white/10"
                                >
                                    <i data-lucide={isDark ? "sun" : "moon"} className="w-4 h-4 text-white"></i>
                                </button>
                            </div>
                        </div>

                        {/* Year Selector */}
                        <div className="max-w-7xl mx-auto mt-8 flex flex-wrap gap-2">
                            {['all', '2025', '2026'].map(yr => (

                                    key={yr}
                                    onClick={() => setSemester(yr)}

                                        semester === yr 
                                        ? "bg-white text-blue-800 border-white shadow-lg scale-105" 
                                        : "bg-white/10 text-white border-white/30 hover:bg-white/20"
                                    }`}
                                >
                                    {yr === 'all' ? 'Todos' : yr}
                                    <span className={`ml-2 px-1.5 py-0.5 rounded-full text-[9px] ${
                                        semester === yr ? "bg-blue-800/10 text-blue-800" : "bg-white/20 text-white"
                                    }`}>
                                        {YEAR_DATA[yr].total}
                                    </span>
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-2 lg:grid-cols-6 gap-3 mb-8">

                            <KPICard label="Masculino / Feminino" value={`${d.totalMasculino} / ${d.totalFeminino}`} accent={CHART_COLORS.purple} isDark={isDark} />

                            <KPICard label="Idade Média" value={d.idadeMedia} suffix=" anos" accent={CHART_COLORS.indigo} isDark={isDark} />
                            <KPICard label="Solteiros(as)" value={d.percentualSolteiros} suffix="%" accent={CHART_COLORS.pink} isDark={isDark} />

                                                <Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={20}>

                                                    <LabelList dataKey="value" position="right" style={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>

                                                <Tooltip content={<CustomTooltip />} cursor={{ fill: isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)' }} />
                                                <Bar dataKey="value" fill={CHART_COLORS.orange} radius={[4, 4, 0, 0]} barSize={32}>
                                                    <LabelList dataKey="value" position="top" style={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>
                            </div>
                        </div>

                        {/* Section: Perfil */}
                        <div className="mb-8">
                            <SectionHeader icon="users" title="Perfil dos Alunos" accent={CHART_COLORS.purple} isDark={isDark} />
                            <div className="grid md:grid-cols-3 gap-4">
                                <ChartCard title="Sexo" isDark={isDark}>
                                    <div className="h-56 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={d.sexo} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={60} outerRadius={85} paddingAngle={4} stroke="none">
                                                    {d.sexo.map((e, i) => (
                                                        <Cell key={i} fill={e.name.toLowerCase().includes('fem') ? CHART_COLORS.green : CHART_COLORS.blue} />
                                                    ))}
                                                </Pie>
                                                <Tooltip content={<CustomTooltip />} />
                                                <Legend content={<CustomLegend />} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>
                                <ChartCard title="Faixa Etária" isDark={isDark}>
                                    <div className="h-56 w-full chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={d.faixaEtaria} margin={{ top: 20 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={gridColor} />
                                                <XAxis dataKey="name" tick={{ fontSize: 10, fill: tickColor, fontWeight: 500 }} axisLine={false} tickLine={false} />
                                                <YAxis hide />
                                                <Tooltip content={<CustomTooltip />} />
                                                <Bar dataKey="value" fill={CHART_COLORS.purple} radius={[4, 4, 0, 0]} barSize={32}>
                                                    <LabelList dataKey="value" position="top" style={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>
                                <ChartCard title="Trabalho" isDark={isDark}>
                                    <div className="h-56 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={d.trabalho} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={85} paddingAngle={4} stroke="none">
                                                    {d.trabalho.map((_, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                                                </Pie>
                                                <Tooltip content={<CustomTooltip />} />
                                                <Legend content={<CustomLegend />} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>
                            </div>
                        </div>

                        {/* Section: Cursos e Localização */}
                        <div className="mb-8">
                            <SectionHeader icon="book-open" title="Cursos e Localização" accent={CHART_COLORS.teal} isDark={isDark} />
                            <div className="grid md:grid-cols-2 gap-4">
                                <ChartCard title="Distribuição por Curso" isDark={isDark}>
                                    <div className="h-52 w-full chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={d.cursos} layout="vertical" margin={{ left: 10, right: 40 }}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={gridColor} />
                                                <XAxis type="number" hide />
                                                <YAxis type="category" dataKey="name" tick={{ fontSize: 9, fill: tickColor, fontWeight: 500 }} axisLine={false} tickLine={false} width={140} />
                                                <Tooltip content={<CustomTooltip />} />
                                                <Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={18}>
                                                    {d.cursos.map((_, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                                                    <LabelList dataKey="value" position="right" style={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>
                                <ChartCard title="Distribuição por Região" isDark={isDark}>
                                    <div className="h-52 w-full chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={d.regiao} layout="vertical" margin={{ left: 0, right: 30 }}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={gridColor} />
                                                <XAxis type="number" hide />
                                                <YAxis type="category" dataKey="name" tick={{ fontSize: 10, fill: tickColor, fontWeight: 500 }} axisLine={false} tickLine={false} width={80} />
                                                <Tooltip content={<CustomTooltip />} />
                                                <Bar dataKey="value" fill={CHART_COLORS.blue} radius={[0, 4, 4, 0]} barSize={18}>
                                                    <LabelList dataKey="value" position="right" style={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </ChartCard>
                            </div>
                        </div>

                        {/* Footer */}
                        <footer className="mt-12 text-center">
                            <p className={`text-xs font-medium uppercase tracking-[0.2em] ${isDark ? "text-slate-600" : "text-slate-300"}`}>
                                Pesquisa Social · Escola Morvan Figueiredo · {d.total} respostas
                            </p>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
