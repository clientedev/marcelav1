<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Social - Escola Morvan Figueiredo</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#0079F2',
                            purple: '#795EFF',
                            green: '#00a86b',
                            red: '#A60808',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @media print {
            .print\:hidden { display: none !important; }
        }
        body { transition: background-color 0.3s ease; }
        .glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .chart-container .recharts-cartesian-grid-horizontal line,
        .chart-container .recharts-cartesian-grid-vertical line {
            stroke-opacity: 0.1;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] transition-colors duration-300">
    <div id="root" class="min-h-screen flex items-center justify-center">
        <div id="loading" class="text-slate-400 font-medium">Carregando painel...</div>
    </div>

    <script type="text/babel">
        // Debugging
        console.log("React Script Starting...");

        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, 
            CartesianGrid, Tooltip, Legend, ResponsiveContainer, LabelList 
        } = Recharts;

        // Data 
        const YEAR_DATA = {
  "2025": {

    "transporte": [{ "name": "Ônibus", "value": 44 }, { "name": "Metrô", "value": 22 }, { "name": "Trem", "value": 17 }, { "name": "Particular", "value": 6 }, { "name": "A pé", "value": 1 }, { "name": "Nenhum", "value": 1 }],

    "escolaridade": [{ "name": "Cursando 2º EM", "value": 70 }, { "name": "EM Completo", "value": 39 }, { "name": "Cursando 3º EM", "value": 30 }, { "name": "Sup. Completo", "value": 7 }, { "name": "Cursando 1º EM", "value": 7 }, { "name": "Outro", "value": 1 }, { "name": "Cursando Superior", "value": 1 }],

    "saude": [{ "name": "Ansiedade", "value": 5 }, { "name": "Depressão", "value": 3 }, { "name": "Pressão", "value": 2 }, { "name": "Asma", "value": 1 }]

  "2026": {

    "cursos": [{ "name": "CT - Téc. Dev. Sistemas", "value": 61 }, { "name": "CT - Téc. Logística", "value": 23 }],
    "periodo": [{ "name": "Integral", "value": 60 }, { "name": "Manhã", "value": 24 }],
    "regiao": [{ "name": "Zona leste", "value": 64 }, { "name": "Zona norte", "value": 8 }, { "name": "Zona sul", "value": 4 }, { "name": "Zona oeste", "value": 4 }, { "name": "ABCD", "value": 3 }, { "name": "Outros", "value": 1 }],
    "faixaEtaria": [{ "name": "13–17", "value": 69 }, { "name": "18–24", "value": 10 }, { "name": "25–34", "value": 5 }],
    "transporte": [{ "name": "Ônibus", "value": 11 }, { "name": "Metrô", "value": 6 }, { "name": "A pé", "value": 5 }, { "name": "Trem", "value": 3 }],
    "conducoes": [{ "name": "1 cond.", "value": 14 }, { "name": "2 cond.", "value": 14 }, { "name": "3 cond.", "value": 7 }, { "name": "4 cond.", "value": 11 }, { "name": "5+ cond.", "value": 13 }],
    "escolaridade": [{ "name": "Cursando 2º EM", "value": 63 }, { "name": "EM Completo", "value": 15 }, { "name": "Outro", "value": 6 }],
    "trabalho": [{ "name": "Sim", "value": 28 }, { "name": "Não", "value": 56 }],

    "dificuldades": [{ "name": "Distância", "value": 1 }],
    "saude": [{ "name": "Não", "value": 1 }]
  },
  "all": {
    "total": 239,
    "totalMasculino": 152,
    "totalFeminino": 86,
    "mediaConducoes": 3.2,
    "percentualComCond": 83,
    "percentualTrabalham": 14,
    "idadeMedia": 17.8,
    "percentualSolteiros": 97,
    "sexo": [{ "name": "Feminino", "value": 86 }, { "name": "Masculino", "value": 152 }, { "name": "Não binário", "value": 1 }],
    "cursos": [{ "name": "CT - Téc. Dev. Sistemas", "value": 123 }, { "name": "CT - Téc. Logística", "value": 84 }, { "name": "CAI", "value": 32 }],
    "periodo": [{ "name": "Integral", "value": 92 }, { "name": "Manhã", "value": 89 }, { "name": "Tarde", "value": 58 }],
    "regiao": [{ "name": "Zona leste", "value": 174 }, { "name": "ABCD", "value": 21 }, { "name": "Zona norte", "value": 19 }, { "name": "Zona sul", "value": 11 }, { "name": "Zona oeste", "value": 8 }, { "name": "Outros", "value": 6 }],
    "faixaEtaria": [{ "name": "13–17", "value": 171 }, { "name": "18–24", "value": 49 }, { "name": "25–34", "value": 15 }, { "name": "35+", "value": 4 }],
    "transporte": [{ "name": "Ônibus", "value": 55 }, { "name": "Metrô", "value": 28 }, { "name": "Trem", "value": 20 }, { "name": "Particular", "value": 6 }, { "name": "A pé", "value": 6 }, { "name": "Nenhum", "value": 1 }],
    "conducoes": [{ "name": "1 cond.", "value": 31 }, { "name": "2 cond.", "value": 72 }, { "name": "3 cond.", "value": 21 }, { "name": "4 cond.", "value": 34 }, { "name": "5+ cond.", "value": 40 }],
    "escolaridade": [{ "name": "Cursando 2º EM", "value": 133 }, { "name": "EM Completo", "value": 54 }, { "name": "Cursando 3º EM", "value": 34 }, { "name": "Superior", "value": 9 }, { "name": "Outro", "value": 9 }],
    "trabalho": [{ "name": "Sim", "value": 33 }, { "name": "Não", "value": 206 }],
    "residencia": [{ "name": "Própria", "value": 15 }, { "name": "Alugada", "value": 12 }, { "name": "Cedida", "value": 2 }],
    "dificuldades": [{ "name": "Nenhuma", "value": 11 }, { "name": "Distância", "value": 10 }, { "name": "Financeiro", "value": 6 }, { "name": "Alimentação", "value": 4 }, { "name": "Outras", "value": 10 }],
    "saude": [{ "name": "Ansiedade", "value": 5 }, { "name": "Depressão", "value": 3 }, { "name": "Pressão", "value": 2 }, { "name": "Outros", "value": 6 }]
  }
};

        const CHART_COLORS = { blue: "#0079F2", purple: "#795EFF", green: "#00a86b", red: "#A60808", pink: "#ec4899", orange: "#f97316", teal: "#0ea5e9", indigo: "#6366f1", amber: "#d97706" };
        const PALETTE = Object.values(CHART_COLORS);

        // Components
        function SectionHeader({ icon: IconName, title, accent, isDark }) {
            return (
                <div className="flex items-center gap-3 mb-4 pb-3 border-b-2 border-opacity-10" style={{ borderBottomColor: accent }}>
                    <div className="w-9 h-9 rounded-xl flex items-center justify-center bg-opacity-10" style={{ backgroundColor: accent, color: accent }}>
                        <i data-lucide={IconName} className="w-5 h-5"></i>
                    </div>
                    <span className={`text-base font-bold ${isDark ? "text-slate-100" : "text-slate-900"}`}>{title}</span>
                    <div className="flex-1 h-px" style={{ backgroundImage: `linear-gradient(90deg, ${accent}44, transparent)` }} />
                </div>
            );
        }

        function ChartCard({ title, children, isDark }) {
            return (
                <div className={`overflow-hidden rounded-2xl border transition-all duration-300 ${isDark ? "bg-slate-800/80 border-white/5 shadow-xl shadow-black/20" : "bg-white border-slate-200 shadow-sm"}`}>
                    <div className={`px-4 py-3 border-b flex items-center justify-between ${isDark ? "border-white/5" : "border-slate-100"}`}>
                        <span className={`text-xs font-bold tracking-wide uppercase opacity-70 ${isDark ? "text-slate-200" : "text-slate-600"}`}>{title}</span>
                    </div>
                    <div className="p-4">{children}</div>
                </div>
            );
        }

        function KPICard({ label, value, suffix = "", accent, isDark, sub }) {
            return (
                <div className={`relative overflow-hidden rounded-2xl p-5 border-t-[3px] transition-all duration-300 ${isDark ? "bg-slate-800/80 border-white/5" : "bg-white border-slate-200 shadow-sm"}`} style={{ borderTopColor: accent }}>
                    <div className="absolute -top-5 -right-5 w-20 h-20 rounded-full bg-opacity-5" style={{ backgroundColor: accent }} />
                    <p className={`text-[10px] font-bold uppercase tracking-widest mb-1.5 ${isDark ? "text-slate-400" : "text-slate-500"}`}>{label}</p>
                    <p className="text-2xl font-black tracking-tighter" style={{ color: accent }}>
                        {value}<span className="text-lg opacity-70 ml-0.5">{suffix}</span>
                    </p>
                    {sub && <p className={`text-[9.5px] font-medium mt-1.5 ${isDark ? "text-slate-500" : "text-slate-400"}`}>{sub}</p>}
                </div>
            );
        }

        const CustomTooltip = ({ active, payload, label }) => {
            if (!active || !payload?.length) return null;
            return (
                <div className="bg-slate-900 border border-white/10 p-3 rounded-xl shadow-2xl glass text-[11px]">
                    {label && <div className="font-bold text-slate-100 mb-1.5 border-b border-white/5 pb-1">{label}</div>}
                    {payload.map((e, i) => (
                        <div key={i} className="flex items-center gap-3 mt-1">
                            <span className="w-2.5 h-2.5 rounded-[3px]" style={{ backgroundColor: e.color || e.fill }} />
                            <span className="text-slate-400">{e.name}:</span>
                            <span className="ml-auto font-black text-slate-100">{e.value}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const CustomLegend = ({ payload }) => (
            <div className="flex flex-wrap justify-center gap-x-4 gap-y-1.5 text-[10px] mt-4 font-medium">
                {payload.map((e, i) => (
                    <div key={i} className="flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-[2px]" style={{ backgroundColor: e.color }} />
                        <span className="text-slate-500">{e.value}</span>
                    </div>
                ))}
            </div>
        );

        function Dashboard() {
            const [isDark, setIsDark] = useState(false);
            const [semester, setSemester] = useState("all");

            useEffect(() => {
                document.documentElement.classList.toggle("dark", isDark);
                if (window.lucide) window.lucide.createIcons();
            }, [isDark, semester]);

            const d = YEAR_DATA[semester];
            const gridColor = isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)";
            const tickColor = isDark ? "#64748b" : "#94a3b8";

            return (
                <div className="min-h-screen pb-12 transition-colors duration-500">
                    <header className="relative pt-10 pb-8 px-6 text-white bg-gradient-to-br from-[#0c4a8f] to-brand-blue dark:from-[#1e3a5f] dark:to-[#1e1b4b] shadow-2xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-end justify-between gap-6">
                            <div>
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="bg-white/10 p-2 rounded-xl border border-white/10">
                                        <i data-lucide="graduation-cap" className="w-6 h-6"></i>
                                    </div>
                                    <span className="text-[11px] font-black uppercase tracking-[0.2em] opacity-60">SENAI Morvan Figueiredo</span>
                                </div>
                                <h1 className="text-4xl font-black tracking-tight leading-none mb-2">Pesquisa Social</h1>
                                <p className="text-sm font-medium opacity-70 tracking-wide translate-x-1 border-l-2 border-white/20 pl-4">
                                    {d.total} respostas coletadas · {semester === 'all' ? 'Dados Consolidados' : `Semestre ${semester}`}
                                </p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsDark(!isDark)} className="p-3 rounded-2xl bg-white/10 hover:bg-white/20 transition-all border border-white/10">
                                    <i data-lucide={isDark ? "sun" : "moon"} className="w-5 h-5"></i>
                                </button>
                                <button onClick={() => window.print()} className="p-3 rounded-2xl bg-white/10 hover:bg-white/20 transition-all border border-white/10">
                                    <i data-lucide="printer" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto mt-10 flex gap-2">
                            {['all', '2025', '2026'].map(y => (
                                <button key={y} onClick={() => setSemester(y)} className={`px-6 py-2 rounded-2xl text-[11px] font-black transition-all ${semester === y ? "bg-white text-blue-900 shadow-xl scale-105" : "bg-white/10 hover:bg-white/20 border border-white/10"}`}>
                                    {y === 'all' ? 'TUDO' : y}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-10">
                        <div className="grid grid-cols-2 lg:grid-cols-6 gap-4 mb-10">
                            <KPICard label="Total Alunos" value={d.total} accent={CHART_COLORS.blue} isDark={isDark} />
                            <KPICard label="M/F Ratio" value={`${d.totalMasculino}/${d.totalFeminino}`} accent={CHART_COLORS.purple} isDark={isDark} />
                            <KPICard label="Conduções/Dia" value={d.mediaConducoes} accent={CHART_COLORS.orange} isDark={isDark} />
                            <KPICard label="Transporte Pago" value={d.percentualComCond} suffix="%" accent={CHART_COLORS.teal} isDark={isDark} />
                            <KPICard label="Idade Média" value={d.idadeMedia} accent={CHART_COLORS.indigo} isDark={isDark} suffix="a" />
                            <KPICard label="Solteiros" value={d.percentualSolteiros} suffix="%" accent={CHART_COLORS.pink} isDark={isDark} />
                        </div>

                        <SectionHeader icon="bus" title="Transporte" accent={CHART_COLORS.blue} isDark={isDark} />
                        <div className="grid md:grid-cols-2 gap-6 mb-10">
                            <ChartCard title="Meios Utilizados" isDark={isDark}>
                                <div className="h-60 w-full chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.transporte} layout="vertical" margin={{ left: 10, right: 40 }}>
                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={gridColor} />
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="name" type="category" tick={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} width={80} axisLine={false} tickLine={false} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={20}>
                                                {d.transporte.map((_, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                                                <LabelList dataKey="value" position="right" style={{ fontSize: 11, fill: tickColor, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                            <ChartCard title="Contagem de Conduções" isDark={isDark}>
                                <div className="h-60 w-full chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.conducoes} margin={{ top: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={gridColor} />
                                            <XAxis dataKey="name" tick={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} axisLine={false} tickLine={false} />
                                            <YAxis hide />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="value" fill={CHART_COLORS.orange} radius={[4, 4, 0, 0]} barSize={40}>
                                                <LabelList dataKey="value" position="top" style={{ fontSize: 11, fill: tickColor, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                        </div>

                        <SectionHeader icon="users" title="Demografia" accent={CHART_COLORS.purple} isDark={isDark} />
                        <div className="grid md:grid-cols-3 gap-6 mb-10">
                            <ChartCard title="Gênero" isDark={isDark}>
                                <div className="h-64 w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={d.sexo} dataKey="value" cx="50%" cy="50%" innerRadius={60} outerRadius={90} paddingAngle={5} stroke="none">
                                                {d.sexo.map((e, i) => <Cell key={i} fill={e.name.includes('Fem') ? CHART_COLORS.green : CHART_COLORS.blue} />)}
                                            </Pie>
                                            <Tooltip content={<CustomTooltip />} />
                                            <Legend content={<CustomLegend />} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                            <ChartCard title="Idade" isDark={isDark}>
                                <div className="h-64 w-full chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.faixaEtaria} margin={{ top: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={gridColor} />
                                            <XAxis dataKey="name" tick={{ fontSize: 10, fill: tickColor, fontWeight: 700 }} axisLine={false} tickLine={false} />
                                            <YAxis hide />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Bar dataKey="value" fill={CHART_COLORS.purple} radius={[4, 4, 0, 0]} barSize={35}>
                                                <LabelList dataKey="value" position="top" style={{ fontSize: 11, fill: tickColor, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                            <ChartCard title="Ocupação" isDark={isDark}>
                                <div className="h-64 w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={d.trabalho} dataKey="value" cx="50%" cy="50%" outerRadius={90} stroke="none" paddingAngle={5}>
                                                {d.trabalho.map((_, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                                            </Pie>
                                            <Tooltip content={<CustomTooltip />} />
                                            <Legend content={<CustomLegend />} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                        </div>

                        <SectionHeader icon="book-open" title="Educação e Curso" accent={CHART_COLORS.teal} isDark={isDark} />
                        <div className="grid md:grid-cols-2 gap-6">
                            <ChartCard title="Cursos" isDark={isDark}>
                                <div className="h-56 w-full chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.cursos} layout="vertical" margin={{ left: 10, right: 50 }}>
                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={gridColor} />
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="name" type="category" tick={{ fontSize: 9, fill: tickColor, fontWeight: 900 }} width={140} axisLine={false} tickLine={false} />
                                            <Bar dataKey="value" radius={[0, 4, 4, 0]} barSize={20}>
                                                {d.cursos.map((_, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                                                <LabelList dataKey="value" position="right" style={{ fontSize: 11, fill: tickColor, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                            <ChartCard title="Escolaridade" isDark={isDark}>
                                <div className="h-56 w-full chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.escolaridade} layout="vertical" margin={{ left: 10, right: 50 }}>
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="name" type="category" tick={{ fontSize: 9, fill: tickColor, fontWeight: 900 }} width={140} axisLine={false} tickLine={false} />
                                            <Bar dataKey="value" fill={CHART_COLORS.indigo} radius={[0, 4, 4, 0]} barSize={20}>
                                                <LabelList dataKey="value" position="right" style={{ fontSize: 11, fill: tickColor, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartCard>
                        </div>
                    </main>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<Dashboard />);
    </script>
</body>
</html>
