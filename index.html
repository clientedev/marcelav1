</head>

        const CHART_COLORS = { blue: "#0079F2", purple: "#795EFF", green: "#22c55e", orange: "#f97316", cyan: "#06b6d4", pink: "#ec4899", indigo: "#6366f1", amber: "#f59e0b" };
        const PALETTE = Object.values(CHART_COLORS);

        // --- UI BLOCKS ---
        function GlassCard({ children, title, className = "", delay = "" }) {
            return (
                <div className={`opacity-0 animate-fade-in-up ${delay} glass card-shadow rounded-3xl border border-white/40 dark:border-white/5 overflow-hidden flex flex-col ${className}`}>
                    {title && <div className="px-6 py-4 border-b border-white/20 dark:border-white/5 flex items-center justify-between"><span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{title}</span></div>}
                    <div className="p-6 flex-1">{children}</div>
                </div>
            );
        }

        function KPICard({ label, value, suffix = "", accent, delay = "" }) {
            return (
                <div className={`opacity-0 animate-fade-in-up ${delay} glass card-shadow rounded-2xl p-5 border-l-4`} style={{ borderLeftColor: accent }}>
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">{label}</p>
                    <p className="text-2xl font-black tracking-tighter" style={{ color: accent }}>{value}<span className="text-sm ml-0.5 opacity-60 font-bold">{suffix}</span></p>
                </div>
            );
        }

        const CustomTooltip = ({ active, payload, label }) => {
            if (!active || !payload?.length) return null;
            return (
                <div className="bg-slate-900 border border-white/10 p-4 rounded-2xl shadow-2xl glass text-xs">
                    {label && <div className="font-black text-white mb-2 pb-1 border-b border-white/5 uppercase tracking-widest text-[9px]">{label}</div>}
                    {payload.map((e, i) => (
                        <div key={i} className="flex items-center gap-3 mt-1.5"><div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: e.color || e.fill }} /><span className="text-slate-400 font-bold">{e.name}:</span><span className="ml-auto font-black text-white">{e.value}</span></div>
                    ))}
                </div>
            );
        };

            const txt = isDark ? "#94a3b8" : "#64748b";

                <div className="min-h-screen pb-20">

                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-end justify-between gap-8">

                                <div className="flex items-center gap-3 mb-4"><div className="bg-white/10 p-2 rounded-xl"><i data-lucide="graduation-cap" className="w-6 h-6"></i></div><span className="text-[10px] font-black uppercase tracking-[0.3em] opacity-60">SENAI Morvan Figueiredo</span></div>

                                <p className="text-sm font-bold opacity-60 border-l-2 border-white/20 pl-4">{d.total} Alunos Matrículados · Censo {semester === 'all' ? 'Geral' : semester}</p>
                            </div>
                            <div className="flex gap-2 animate-fade-in-up opacity-0 stagger-1">
                                <button onClick={() => setIsDark(!isDark)} className="p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all"><i data-lucide={isDark ? "sun" : "moon"} className="w-5 h-5"></i></button>
                                <button onClick={() => window.print()} className="p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all"><i data-lucide="printer" className="w-5 h-5"></i></button>

                        </div>
                        <div className="max-w-7xl mx-auto mt-12 flex gap-3 animate-fade-in-up opacity-0 stagger-2">

                            <KPICard label="Conduções Méd" value={d.mediaConducoes} accent={CHART_COLORS.orange} delay="stagger-2" />
                            <KPICard label="Transporte Pago" value={d.percentualComCond} suffix="%" accent={CHART_COLORS.cyan} delay="stagger-2" />

                                    <div className="h-72 chart-container">

                                            <BarChart data={d.transporte} layout="vertical" margin={{ left: 10, right: 60 }}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={grid} />
                                                <XAxis type="number" hide />
                                                <YAxis dataKey="name" type="category" tick={{ fontSize: 10, fill: txt, fontWeight: 700 }} width={100} axisLine={false} tickLine={false} />
                                                <Tooltip content={<CustomTooltip />} />
                                                <Bar dataKey="value" radius={[0, 8, 8, 0]} barSize={24}>
                                                    {d.transporte.map((_, i) => <Cell key={i} fill={PALETTE[i % PALETTE.length]} />)}
                                                    <LabelList dataKey="value" position="right" offset={10} style={{ fontSize: 11, fill: txt, fontWeight: 900 }} />
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </GlassCard>
                            </div>

                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </GlassCard>
                            </div>
                        </div>

                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </GlassCard>
                            <GlassCard title="Escolaridade Anterior" delay="stagger-3">
                                <div className="h-64 chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.escolaridade} layout="vertical" margin={{ left: 10, right: 40 }}>
                                            <YAxis dataKey="name" type="category" tick={{ fontSize: 9, fill: txt, fontWeight: 700 }} width={120} axisLine={false} tickLine={false} />
                                            <XAxis type="number" hide />
                                            <Bar dataKey="value" fill={CHART_COLORS.indigo} radius={[0, 6, 6, 0]} barSize={18}>
                                                <LabelList dataKey="value" position="right" style={{ fontSize: 10, fill: txt, fontWeight: 800 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </GlassCard>
                            <GlassCard title="Localidade de Origem" delay="stagger-3">
                                <div className="h-64 chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.regiao} layout="vertical" margin={{ left: 10, right: 40 }}>

                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </GlassCard>
                        </div>

                        {/* ROW 3: RESIDENCIA & DIFICULDADES (THE MISSING DATA) */}

                                    <div className="h-72">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={d.residencia} dataKey="value" cx="50%" cy="50%" innerRadius={60} outerRadius={90} paddingAngle={5} stroke="none">
                                                    {d.residencia.map((_, i) => <Cell key={i} fill={PALETTE[(i+4) % PALETTE.length]} />)}

                                                <Tooltip content={<CustomTooltip />} />
                                                <Legend />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </GlassCard>
                            </div>

                                <GlassCard title="Maiores Dificuldades Enfrentadas" delay="stagger-4">
                                    <div className="h-72 chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={d.dificuldades} layout="vertical" margin={{ left: 10, right: 60 }}>

                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </GlassCard>
                            </div>
                        </div>

                        {/* ROW 4: SAUDE & CONDUCOES */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <GlassCard title="Saúde e Bem-estar" delay="stagger-4">
                                <div className="h-64 chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.saude} layout="vertical" margin={{ left: 10, right: 40 }}>
                                            <YAxis dataKey="name" type="category" tick={{ fontSize: 10, fill: txt, fontWeight: 700 }} width={120} axisLine={false} tickLine={false} />
                                            <Bar dataKey="value" fill={CHART_COLORS.amber} radius={[0, 6, 6, 0]} barSize={20}>
                                                <LabelList dataKey="value" position="right" style={{ fontSize: 11, fill: txt, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </GlassCard>
                            <GlassCard title="Contagem de Conduções (Diário)" delay="stagger-4">
                                <div className="h-64 chart-container">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={d.conducoes}>
                                            <XAxis dataKey="name" tick={{ fontSize: 9, fill: txt, fontWeight: 700 }} axisLine={false} tickLine={false} />
                                            <YAxis hide />
                                            <Bar dataKey="value" fill={CHART_COLORS.orange} radius={[6, 6, 0, 0]} barSize={35}>
                                                <LabelList dataKey="value" position="top" style={{ fontSize: 11, fill: txt, fontWeight: 900 }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </GlassCard>
                        </div>

                        <footer className="mt-20 text-center opacity-40 border-t border-slate-200 dark:border-white/5 pt-12"><p className="text-[9px] font-black uppercase tracking-[0.4em]">© 2026 Escola Morvan Figueiredo · Insights Socioeconômicos</p></footer>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>
